stages:
  - test
  - build
  - deploy
variables:
  TAG_LATEST: $CI_REGISTRY_IMAGE/$CI_COMMIT_REF_NAME:latest
  TAG_COMMIT: $CI_REGISTRY_IMAGE/$CI_COMMIT_REF_NAME:$CI_COMMIT_SHORT_SHA

docker-build:
  stage: build
  image: docker:latest
  variables:
    DOCKER_HOST: tcp://docker:2375 
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]

  before_script:
    - echo "Logging in to Docker Registry..."
    - docker login -u $CI_TKN_LN -p $CI_TKN_PW $CI_REGISTRY
  script:
    - echo "Building Docker image (secrets at runtime, not baked into layers)..."
    - docker logout
    - docker build --pull -t $TAG_LATEST .
    - docker login -u $CI_TKN_LN -p $CI_TKN_PW $CI_REGISTRY
    - docker images
    - echo "Tagging Docker image with commit hash..."
    - docker tag $TAG_LATEST $TAG_COMMIT
    - echo "Pushing images to Docker Registry..."
    - docker push $TAG_LATEST
